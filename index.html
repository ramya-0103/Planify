<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Ramya's To-Do App</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="container">

    <h1>Planify✨</h1>

    <!-- INPUT SECTION -->
    <div class="input-section">

      <input
        type="text"
        id="taskInput"
        placeholder="Enter your task..."
      />

      <button id="addBtn">
        Add Task
      </button>

    </div>


    <!-- SEARCH SECTION -->
    <div class="search-section">

      <input
        type="text"
        id="searchInput"
        placeholder="Search tasks..."
      />

    </div>


    <!-- TOP BAR -->
    <div class="top-bar">

      <p>
        Total Tasks:
        <span id="taskCount">0</span>
      </p>

      <button id="darkModeBtn">
        🌗 Theme
      </button>

    </div>


    <!-- TASK LIST -->
    <ul id="taskList"></ul>


    <!-- CLEAR COMPLETED -->
    <button id="clearCompleted">

      Clear Completed

    </button>


    <!-- FOOTER -->
    <footer>

      <!--Built by Sugguna Ramya Sri 💖-->

    </footer>

  </div>

  <script src="script.js"></script>

</body>
</html>
